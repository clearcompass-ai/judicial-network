    endpoint: "https://escrow1.courts.tn.gov/v1"

  - did: "did:web:escrow2.courts.tn.gov"
    endpoint: "https://escrow2.courts.tn.gov/v1"

  - did: "did:web:escrow3.courts.tn.gov"
    endpoint: "https://escrow3.courts.tn.gov/v1"

  - did: "did:web:escrow4.courts.tn.gov"
    endpoint: "https://escrow4.courts.tn.gov/v1"

  - did: "did:web:escrow5.courts.tn.gov"
