openapi: 3.1.0

# ─────────────────────────────────────────────────────────────────────
# Info
# ─────────────────────────────────────────────────────────────────────
info:
  title: Ortholog Judicial Network API
  version: 0.1.0
  summary: Multi-court federation API for judicial log entries, artifacts, and cross-court verification.
  description: |
    The Judicial Network (JN) API is the HTTP surface for an Ortholog
    deployment serving one or more courts on a single listener. The
    composer mounts three sub-surfaces:

      - `/v1/judicial/*` — domain-aware judicial flows (cases, appeals,
        enforcement, parties, onboarding, artifacts, verification,
        monitoring, consortium federation, delegation, topology).
      - `/v1/entries/*`, `/v1/artifacts/*`, `/v1/delegations/*`,
        `/v1/keys/*`, `/v1/dids`, `/v1/scope/*` — generic Ortholog
        protocol surface (build/sign/submit, key custody, scope
        amendment).
      - `/v1/verify/*` — read-side verification (origin, authority,
        delegation, cross-log, fraud-proof).

    Routing is multi-tenant payload-driven: every entry's destination
    is sourced from `entry.Header.Destination`, looked up in the
    Bundle Registry. There is exactly one handler tree per route
    family, shared across all registered destinations.

    ### Build / sign / submit pattern

    Most write endpoints under `/v1/judicial/*` return a
    `BuildResponse` carrying the unsigned entry bytes and the
    signing payload. The caller signs the payload externally
    (typically through Privy or an SCW party signer) and submits the
    signed entry to `/v1/entries/submit`. Endpoints that require
    state mutation beyond a single entry (cross-log proofs, lifecycle
    amendments) are explicitly `501 Not Implemented` with operational
    reasoning attached — those flows are operator-tooling driven.

    ### Authentication

    Two composer-level modes are supported:

      - **mTLS**: client cert SAN URI carries the caller's DID;
        composer middleware lifts it into request context.
      - **JWT**: `Authorization: Bearer <jwt>` validated against a
        configured JWKS endpoint; the `sub` claim is the caller DID.

    Per-handler auth (api/exchange `SignerAuth`) layers signed-request
    replay protection on top for write endpoints under
    `/v1/entries/*`, `/v1/artifacts/*`, `/v1/keys/*`, `/v1/dids`,
    `/v1/delegations/*`, `/v1/scope/*`.
  contact:
    name: ClearCompass AI
    url: https://github.com/clearcompass-ai/judicial-network
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

# ─────────────────────────────────────────────────────────────────────
# Servers
# ─────────────────────────────────────────────────────────────────────
servers:
  - url: https://{host}:{port}
    description: Production deployment (mTLS).
    variables:
      host:
        default: api.davidson.tn.courts.gov
      port:
        default: '8443'
  - url: http://localhost:8080
    description: Local development (plain HTTP, no auth).

# ─────────────────────────────────────────────────────────────────────
# Tags
# ─────────────────────────────────────────────────────────────────────
tags:
  - name: Cases
    description: Case initiation, amendment, lookup, filings, judicial actions, division/county transfer.
  - name: Appeals
    description: Appeal initiation, decisions, mandates (affirm/reverse), record transfer.
  - name: Enforcement
    description: Sealing, unsealing (with cosignature), expungement, evidence access grants, compliance.
  - name: Parties
    description: Party/binding lifecycle, case-link records, sealed (PRE-encrypted) bindings.
  - name: Onboarding
    description: Schema adoption, court provisioning, anchor registration, legacy record migration.
  - name: Artifacts (Judicial)
    description: Court-grade artifact publish/retrieve/expunge/reencrypt with delegation-aware grants.
  - name: Verification
    description: Read-side verification of case status, enforcement, custody, appeals, cross-log.
  - name: Monitoring
    description: Operational monitors — blob availability, delegation health, sealing/grant compliance.
  - name: Consortium
    description: Multi-court federation (membership proposals, cross-court proofs).
  - name: Delegation (Judicial)
    description: Delegation issue/revoke/succession (operational-tooling 501 stubs).
  - name: Topology
    description: Anchor publish + chain discovery (operational-tooling 501 stubs).
  - name: Entries
    description: Generic build/sign/submit pipeline + entry status.
  - name: Artifacts
    description: Generic artifact publish + grant.
  - name: Delegations
    description: Generic delegation create/revoke.
  - name: Keys
    description: Key custody operations (generate, rotate, escrow, list).
  - name: DIDs
    description: DID lifecycle.
  - name: Scope
    description: Scope amendment lifecycle (propose/approve/execute).
  - name: Verify
    description: Generic verification read paths.
  - name: Health
    description: Liveness probes.

# ─────────────────────────────────────────────────────────────────────
# Security
# ─────────────────────────────────────────────────────────────────────
security:
  - mTLS: []
  - bearerAuth: []

# ─────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────
paths:

  # ── Health ────────────────────────────────────────────────────────
  /healthz:
    get:
      tags: [Health]
      summary: Composer-level liveness probe.
      operationId: health
      security: []
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /v1/judicial/healthz:
    get:
      tags: [Health]
      summary: Stand-alone judicial liveness probe (shadowed in composed deployments).
      operationId: judicialHealth
      security: []
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /v1/openapi.yaml:
    get:
      tags: [Health]
      summary: Canonical OpenAPI 3.1 spec for this deployment.
      description: |
        Served unauthenticated so external tooling (Swagger UI, code
        generators) can fetch the spec without a client cert.
      operationId: openapiSpec
      security: []
      responses:
        '200':
          description: OpenAPI 3.1 YAML.
          content:
            application/yaml:
              schema:
                type: string

  # ── Cases ─────────────────────────────────────────────────────────
  /v1/judicial/cases:
    post:
      tags: [Cases]
      summary: Initiate a new case.
      description: |
        Builds an unsigned case-root entry. Returns the signing
        payload; caller signs externally and submits to
        `/v1/entries/submit`.
      operationId: caseInitiate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseInitiateRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/cases/{caseRootSeq}/amend:
    post:
      tags: [Cases]
      summary: Amend an existing case (status change, reassignment, artifact update).
      operationId: caseAmend
      parameters:
        - $ref: '#/components/parameters/CaseRootSeq'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseAmendRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/cases/{caseRootSeq}/filings:
    post:
      tags: [Cases]
      summary: Record a filing on a case (publishes the artifact + builds the filing entry).
      operationId: caseFile
      parameters:
        - $ref: '#/components/parameters/CaseRootSeq'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseFilingRequest'
      responses:
        '200':
          description: Filing entry built; artifact published and pinned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilingResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/cases/{caseRootSeq}/actions:
    post:
      tags: [Cases]
      summary: Record a judicial action (ruling, order, sentence, disposition).
      operationId: caseAction
      parameters:
        - $ref: '#/components/parameters/CaseRootSeq'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseActionRequest'
      responses:
        '200':
          description: Action entry built; opinion artifact published if attached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilingResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/cases/{docket}:
    get:
      tags: [Cases]
      summary: Look up a case by docket number.
      operationId: caseLookup
      parameters:
        - name: docket
          in: path
          required: true
          schema: { type: string }
          description: URL-encoded docket number.
        - name: log_did
          in: query
          required: true
          schema: { type: string }
          description: Cases-log DID to scan.
      responses:
        '200':
          description: Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseLookupResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/judicial/cases/{caseRootSeq}/transfer/division:
    post:
      tags: [Cases]
      summary: Transfer a case between divisions of the same court.
      operationId: caseTransferDivision
      parameters:
        - $ref: '#/components/parameters/CaseRootSeq'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseTransferDivisionRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/cases/{caseRootSeq}/transfer/county:
    post:
      tags: [Cases]
      summary: Transfer a case between counties (cross-court).
      description: |
        501 Not Implemented. Cross-court transfer requires composing a
        source-side amendment + N delegation mirrors + an anchor
        commitment chain. Operator-tooling driven — the JN binary
        composes the bundle, not the HTTP surface.
      operationId: caseTransferCounty
      parameters:
        - $ref: '#/components/parameters/CaseRootSeq'
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }

  # ── Appeals ───────────────────────────────────────────────────────
  /v1/judicial/appeals/decisions:
    post:
      tags: [Appeals]
      summary: Record an appellate decision (per-court appeals log entry).
      operationId: appealDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppealDecisionRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/appeals/mandates/affirm:
    post:
      tags: [Appeals]
      summary: Issue an affirm-mandate (no cross-log composition).
      operationId: appealMandateAffirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppealMandateAffirmRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/appeals/initiations:
    post:
      tags: [Appeals]
      summary: Initiate an appeal (cross-log).
      description: |
        501 Not Implemented. Cross-log initiation requires composing a
        source-court reference + appeals-log notice — operator-tooling
        driven.
      operationId: appealInitiate
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }
  /v1/judicial/appeals/mandates/reverse:
    post:
      tags: [Appeals]
      summary: Issue a reverse-mandate (cross-log; remands the case-root entry).
      description: 501 Not Implemented. Cross-log; operator-tooling composes.
      operationId: appealMandateReverse
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }
  /v1/judicial/appeals/records/transfer:
    post:
      tags: [Appeals]
      summary: Transfer the appellate record back to the trial court.
      description: 501 Not Implemented. Cross-log; operator-tooling composes.
      operationId: appealRecordTransfer
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }

  # ── Enforcement ───────────────────────────────────────────────────
  /v1/judicial/enforcement/seal:
    post:
      tags: [Enforcement]
      summary: Seal a case (statutory sealing — auto-activates after dwell).
      operationId: enforcementSeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SealRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/unseal:
    post:
      tags: [Enforcement]
      summary: Unseal a previously sealed case.
      operationId: enforcementUnseal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsealRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/unseal/cosignature:
    post:
      tags: [Enforcement]
      summary: Add a cosignature to an in-flight unseal request.
      operationId: enforcementUnsealCosignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsealCosignatureRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/sealing-status:
    get:
      tags: [Enforcement]
      summary: Check whether a sealing has activated.
      operationId: enforcementSealingStatus
      parameters:
        - name: log_did
          in: query
          required: true
          schema: { type: string }
        - name: seal_seq
          in: query
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Sealing status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SealingStatusResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/expunge:
    post:
      tags: [Enforcement]
      summary: Expunge a case (irreversibly destroys plaintext custody).
      operationId: enforcementExpunge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpungeRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/evidence-access:
    post:
      tags: [Enforcement]
      summary: Grant evidence access to a third party (delegation-aware).
      operationId: enforcementEvidenceAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceAccessRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/enforcement/compliance:
    get:
      tags: [Enforcement]
      summary: Run a compliance sweep over a window of entries.
      operationId: enforcementCompliance
      parameters:
        - name: log_did
          in: query
          required: true
          schema: { type: string }
        - name: start_seq
          in: query
          required: true
          schema: { type: integer, format: uint64 }
        - name: end_seq
          in: query
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Compliance report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReport'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Parties ───────────────────────────────────────────────────────
  /v1/judicial/parties/bindings:
    post:
      tags: [Parties]
      summary: Create a party-binding entry.
      operationId: partyBindingCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartyBindingCreateRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      tags: [Parties]
      summary: List party bindings on a case.
      operationId: partyBindingList
      parameters:
        - name: log_did
          in: query
          required: true
          schema: { type: string }
        - name: case_root_seq
          in: query
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Bindings list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyBindingsList'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/parties/bindings/{seq}/status:
    patch:
      tags: [Parties]
      summary: Update a party binding's status.
      operationId: partyBindingUpdate
      parameters:
        - name: seq
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartyBindingUpdateRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/parties/case-links:
    post:
      tags: [Parties]
      summary: Link a party to a case via a binding pointer.
      operationId: partyCaseLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartyCaseLinkRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/parties/bindings/sealed:
    post:
      tags: [Parties]
      summary: Create a sealed party-binding (PRE-encrypted real DID).
      description: |
        Used for protected populations (juvenile, victim) where the
        real DID is encrypted to a recovery quorum and only released
        on cosigned unseal.
      operationId: partyBindingSealed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartyBindingSealedRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/parties/bindings/by-id/{bindingID}:
    get:
      tags: [Parties]
      summary: Look up a party binding by its stable binding ID.
      operationId: partyBindingFind
      parameters:
        - name: bindingID
          in: path
          required: true
          schema: { type: string }
        - name: log_did
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartyBinding'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Onboarding ────────────────────────────────────────────────────
  /v1/judicial/onboarding/schema-adoption:
    post:
      tags: [Onboarding]
      summary: Adopt a JN schema into a court's catalog.
      operationId: onboardingAdoptSchema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaAdoptRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/onboarding/court-provision:
    post:
      tags: [Onboarding]
      summary: Provision a new court (bootstrap).
      description: 501 Not Implemented. Bootstrap-script-driven.
      operationId: onboardingCourtProvision
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }
  /v1/judicial/onboarding/anchor-registration:
    post:
      tags: [Onboarding]
      summary: Register an anchor relationship (state ↔ county).
      description: 501 Not Implemented. Requires `*witness.TreeHeadClient`.
      operationId: onboardingAnchorRegistration
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }
  /v1/judicial/onboarding/migrate-records:
    post:
      tags: [Onboarding]
      summary: Migrate legacy records into the JN.
      description: 501 Not Implemented. Bulk-import operator tooling.
      operationId: onboardingMigrateRecords
      responses:
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501': { $ref: '#/components/responses/NotImplemented' }

  # ── Artifacts (Judicial) ──────────────────────────────────────────
  /v1/judicial/artifacts:
    post:
      tags: [Artifacts (Judicial)]
      summary: Publish a judicial artifact (encrypted at rest, content-addressed).
      operationId: judicialArtifactPublish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactPublishRequest'
      responses:
        '200':
          description: Published; returns CID + key fingerprints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishedArtifact'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/judicial/artifacts/retrieve:
    get:
      tags: [Artifacts (Judicial)]
      summary: Retrieve an artifact's grant material (server-side decrypt is forbidden).
      operationId: judicialArtifactRetrieve
      parameters:
        - name: cid
          in: query
          required: true
          schema: { type: string }
        - name: as_role
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Grant + ciphertext bytes; caller decrypts with their key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/judicial/artifacts/{cid}:
    delete:
      tags: [Artifacts (Judicial)]
      summary: Expunge an artifact (irreversibly destroys ciphertext + grant material).
      operationId: judicialArtifactExpunge
      parameters:
        - name: cid
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Expunged.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/judicial/artifacts/reencrypt:
    post:
      tags: [Artifacts (Judicial)]
      summary: Re-encrypt an artifact under a new role/key.
      operationId: judicialArtifactReencrypt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactReencryptRequest'
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

