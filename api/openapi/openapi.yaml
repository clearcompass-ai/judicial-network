            application/json:
              schema: { $ref: '#/components/schemas/ApprovalStatus' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /v1/scope/execute/{pos}:
    post:
      tags: [Scope]
      summary: Execute a fully-approved scope amendment (Phase 3).
      operationId: scopeExecute
      parameters:
        - name: pos
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200': { $ref: '#/components/responses/BuildResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Verify (api/verification) ─────────────────────────────────────
  /v1/verify/origin/{logID}/{pos}:
    get:
      tags: [Verify]
      summary: Verify an entry's origin (signature + envelope).
      operationId: verifyOrigin
      parameters:
        - name: logID
          in: path
          required: true
          schema: { type: string }
        - name: pos
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/verify/authority/{logID}/{pos}:
    get:
      tags: [Verify]
      summary: Verify an entry's authority chain.
      operationId: verifyAuthority
      parameters:
        - name: logID
          in: path
          required: true
          schema: { type: string }
        - name: pos
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/verify/batch/{logID}/{positions}:
    get:
      tags: [Verify]
      summary: Verify a batch of entries on a log (positions = comma-separated uint64s).
      operationId: verifyBatch
      parameters:
        - name: logID
          in: path
          required: true
          schema: { type: string }
        - name: positions
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Per-position results.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VerifyResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/verify/delegation/{logID}/{pos}:
    get:
      tags: [Verify]
      summary: Verify a delegation entry.
      operationId: verifyDelegation
      parameters:
        - name: logID
          in: path
          required: true
          schema: { type: string }
        - name: pos
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/verify/cross-log:
    post:
      tags: [Verify]
      summary: Verify a generic cross-log proof.
      operationId: verifyCrossLog
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CrossLogProofRequest' }
      responses:
        '200':
          description: Verdict.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CrossLogProofResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /v1/verify/fraud-proof:
    post:
      tags: [Verify]
      summary: Verify a fraud proof (e.g., split-view by an operator).
      operationId: verifyFraudProof
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FraudProofRequest' }
      responses:
        '200':
          description: Verdict.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyResult' }
        '400': { $ref: '#/components/responses/BadRequest' }

# ─────────────────────────────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────────────────────────────
components:

  # ── Security schemes ──────────────────────────────────────────────
  securitySchemes:
    mTLS:
      type: mutualTLS
      description: |
        Client certificate carries the caller's DID in a SAN URI.
        Composer-level middleware lifts it into request context.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT validated against a configured JWKS endpoint. The `sub`
        claim is the caller DID.

  # ── Reusable parameters ───────────────────────────────────────────
  parameters:
    CaseRootSeq:
      name: caseRootSeq
      in: path
      required: true
      schema: { type: integer, format: uint64 }
      description: Case-root entry sequence on the cases log.

  # ── Reusable responses ────────────────────────────────────────────
  responses:
    BuildResponse:
      description: Built entry; caller signs and submits to /v1/entries/submit.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BuildResponse' }
    SignedEntry:
      description: Signed entry.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SignedEntry' }
    SubmittedEntry:
      description: Submitted entry; carries the operator-assigned position.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SubmittedEntry' }
    MonitorResult:
      description: Monitor verdict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MonitorResult' }
    BadRequest:
      description: Invalid request body or missing required fields.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid auth (no callerDID resolved).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotImplemented:
      description: |
        Endpoint is reachable but the underlying operation requires
        operator tooling (process-scoped BuildContext, witness
        TreeHeadClient, lifecycle Params, etc.). The body's `error`
        field carries the operational reasoning.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Server-side error (typically a misconfigured dependency).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  # ── Schemas ───────────────────────────────────────────────────────
  schemas:

    # ── Common ────────────────────────────────────────────────────
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.

    LogPositionRef:
      type: object
      required: [log_did, sequence]
      properties:
        log_did: { type: string }
        sequence: { type: integer, format: uint64 }

    ControlHeader:
      type: object
      description: Subset of envelope.ControlHeader exposed for caller inspection.
      properties:
        destination: { type: string }
        signer_did: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        event_time: { type: integer, format: int64 }

    BuildResponse:
      type: object
      required: [signing_payload, entry_bytes, header]
      properties:
        signing_payload:
          type: string
          format: byte
          description: Bytes the caller must SHA-256 + sign (base64).
        entry_bytes:
          type: string
          format: byte
          description: Same bytes as signing_payload (base64) for transport ergonomics.
        header:
          $ref: '#/components/schemas/ControlHeader'

    # ── Cases ─────────────────────────────────────────────────────
    CaseInitiateRequest:
      type: object
      required: [destination, docket_number, case_type, filed_date]
      properties:
        destination: { type: string }
        docket_number: { type: string }
        case_type:
          type: string
          enum: [criminal, civil, family, juvenile]
        filed_date: { type: string, description: ISO-8601 date }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        extra_payload:
          type: object
          additionalProperties: true
        event_time: { type: integer, format: int64 }

    CaseAmendRequest:
      type: object
      required: [destination, case_root_log_did, amendment_type]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        amendment_type:
          type: string
          enum: [status_change, reassignment, artifact_update]
        new_status: { type: string }
        new_artifact_cid: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        evidence_pointers:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }

    CaseFilingRequest:
      type: object
      required: [destination, case_root_log_did, document_type, document_title]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        delegation_pointers:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }
        document_type: { type: string }
        document_title: { type: string }
        plaintext_b64:
          type: string
          format: byte
          description: Base64-encoded artifact plaintext.

    CaseActionRequest:
      type: object
      required: [destination, case_root_log_did, action_type, description]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        action_type:
          type: string
          enum: [ruling, order, sentence, disposition]
        description: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        candidate_positions:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }
        plaintext_b64: { type: string, format: byte }

    CaseTransferDivisionRequest:
      type: object
      required: [destination, case_root_log_did, target_division, reason]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        target_division: { type: string }
        reason: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        event_time: { type: integer, format: int64 }

    FilingResponse:
      type: object
      required: [signing_payload, entry_bytes, header, artifact_cid]
      properties:
        signing_payload: { type: string, format: byte }
        entry_bytes: { type: string, format: byte }
        header: { $ref: '#/components/schemas/ControlHeader' }
        artifact_cid: { type: string }

    CaseLookupResponse:
      type: object
      properties:
        case_root_seq: { type: integer, format: uint64 }
        docket_number: { type: string }
        case_type: { type: string }
        status: { type: string }
        amendments:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }

    # ── Appeals ───────────────────────────────────────────────────
    AppealDecisionRequest:
      type: object
      required: [destination, appeal_initiation, decision_type]
      properties:
        destination: { type: string }
        appeal_initiation: { $ref: '#/components/schemas/LogPositionRef' }
        decision_type:
          type: string
          enum: [affirmed, reversed, remanded, dismissed]
        opinion_summary: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }
        opinion_b64: { type: string, format: byte }

    AppealMandateAffirmRequest:
      type: object
      required: [destination, decision_pointer]
      properties:
        destination: { type: string }
        decision_pointer: { $ref: '#/components/schemas/LogPositionRef' }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    # ── Enforcement ───────────────────────────────────────────────
    SealRequest:
      type: object
      required: [destination, case_root_log_did, seal_type]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        seal_type:
          type: string
          enum: [statutory, judicial_order, juvenile_default]
        statute_citation: { type: string }
        dwell_seconds: { type: integer, format: int64 }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    UnsealRequest:
      type: object
      required: [destination, seal_pointer, justification]
      properties:
        destination: { type: string }
        seal_pointer: { $ref: '#/components/schemas/LogPositionRef' }
        justification: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    UnsealCosignatureRequest:
      type: object
      required: [destination, unseal_request_pointer]
      properties:
        destination: { type: string }
        unseal_request_pointer: { $ref: '#/components/schemas/LogPositionRef' }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    SealingStatusResponse:
      type: object
      properties:
        seal_seq: { type: integer, format: uint64 }
        activated: { type: boolean }
        activation_seq: { type: integer, format: uint64 }
        dwell_remaining_seconds: { type: integer, format: int64 }

    ExpungeRequest:
      type: object
      required: [destination, case_root_log_did, statute_citation]
      properties:
        destination: { type: string }
        case_root_log_did: { type: string }
        statute_citation: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    EvidenceAccessRequest:
      type: object
      required: [destination, artifact_cid, recipient_did]
      properties:
        destination: { type: string }
        artifact_cid: { type: string }
        recipient_did: { type: string }
        delegation_pointer: { $ref: '#/components/schemas/LogPositionRef' }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    ComplianceReport:
      type: object
      properties:
        log_did: { type: string }
        start_seq: { type: integer, format: uint64 }
        end_seq: { type: integer, format: uint64 }
        violations:
          type: array
          items: { $ref: '#/components/schemas/ComplianceViolation' }

    ComplianceViolation:
      type: object
      properties:
        seq: { type: integer, format: uint64 }
        kind: { type: string }
        message: { type: string }

    # ── Parties ───────────────────────────────────────────────────
    PartyBindingCreateRequest:
      type: object
      required: [destination, party_did, party_role]
      properties:
        destination: { type: string }
        party_did: { type: string }
        party_role:
          type: string
          enum: [defendant, plaintiff, witness, attorney, victim, juvenile]
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    PartyBindingUpdateRequest:
      type: object
      required: [destination, new_status]
      properties:
        destination: { type: string }
        new_status: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    PartyCaseLinkRequest:
      type: object
      required: [destination, binding_pointer, case_root_log_did]
      properties:
        destination: { type: string }
        binding_pointer: { $ref: '#/components/schemas/LogPositionRef' }
        case_root_log_did: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    PartyBindingSealedRequest:
      type: object
      required: [destination, party_role, real_did_ciphertext_b64]
      properties:
        destination: { type: string }
        party_role: { type: string }
        real_did_ciphertext_b64:
          type: string
          format: byte
          description: PRE-encrypted real DID (recovery quorum can decrypt).
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    PartyBinding:
      type: object
      properties:
        binding_id: { type: string }
        party_did: { type: string }
        party_role: { type: string }
        status: { type: string }
        position: { $ref: '#/components/schemas/LogPositionRef' }

    PartyBindingsList:
      type: object
      properties:
        bindings:
          type: array
          items: { $ref: '#/components/schemas/PartyBinding' }

    # ── Onboarding ────────────────────────────────────────────────
    SchemaAdoptRequest:
      type: object
      required: [destination, schema_id, schema_version]
      properties:
        destination: { type: string }
        schema_id: { type: string }
        schema_version: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    # ── Artifacts ─────────────────────────────────────────────────
    ArtifactPublishRequest:
      type: object
      required: [destination, plaintext_b64]
      properties:
        destination: { type: string }
        plaintext_b64: { type: string, format: byte }
        document_type: { type: string }
        delegation_pointers:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    ArtifactReencryptRequest:
      type: object
      required: [destination, cid, target_role]
      properties:
        destination: { type: string }
        cid: { type: string }
        target_role: { type: string }
        schema_ref: { type: integer, format: uint64 }
        schema_log_did: { type: string }

    PublishedArtifact:
      type: object
      properties:
        cid: { type: string }
        pk_del: { type: string }
        capsule_b64: { type: string, format: byte }

    GrantResult:
      type: object
      properties:
        cid: { type: string }
        ciphertext_b64: { type: string, format: byte }
        capsule_b64: { type: string, format: byte }
        grant_proof: { type: object, additionalProperties: true }

    GenericArtifactPublishRequest:
      $ref: '#/components/schemas/ArtifactPublishRequest'

    # ── Verification ──────────────────────────────────────────────
    VerifyFilingDelegationRequest:
      type: object
      required: [delegation_pointers]
      properties:
        delegation_pointers:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }
        as_of: { type: integer, format: int64 }

    VerifyAppealChainRequest:
      type: object
      required: [steps]
      properties:
        steps:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }

    CrossLogProofRequest:
      type: object
      required: [proof, source_log_did]
      properties:
        proof:
          type: object
          additionalProperties: true
          description: Marshaled types.CrossLogProof.
        source_log_did: { type: string }
        source_witness_keys_b64:
          type: array
          items: { type: string, format: byte }
        source_witness_quorum: { type: integer }

    CrossLogProofResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }
        error: { type: string }

    CaseStatusResult:
      type: object
      properties:
        status: { type: string }
        verified: { type: boolean }
        amendments:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }

    EnforcementStatusResult:
      type: object
      properties:
        kind: { type: string }
        activated: { type: boolean }
        verified: { type: boolean }

    CustodyChain:
      type: object
      properties:
        publish: { $ref: '#/components/schemas/LogPositionRef' }
        grants:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }
        expunge: { $ref: '#/components/schemas/LogPositionRef' }
        verified: { type: boolean }

    BackgroundCheckResult:
      type: object
      properties:
        party_did: { type: string }
        prior_cases:
          type: array
          items: { $ref: '#/components/schemas/LogPositionRef' }

    VerifyResult:
      type: object
      required: [verified]
      properties:
        verified: { type: boolean }
        error: { type: string }
        details: { type: object, additionalProperties: true }

    FraudProofRequest:
      type: object
      properties:
        kind: { type: string }
        evidence: { type: object, additionalProperties: true }

    # ── Monitoring ────────────────────────────────────────────────
    MonBlobAvailRequest:
      type: object
      required: [backend]
      properties:
        backend: { type: string, enum: [gcs, s3, ipfs, local] }
        expected_present:
          type: array
          items: { type: string }
        expected_absent:
          type: array
          items: { type: string }

    MonDelegationHealthRequest:
      type: object
      required: [local_log_did, officers_log_did]
      properties:
        local_log_did: { type: string }
        officers_log_did: { type: string }
        as_of: { type: integer, format: int64 }

    MonDualAttestationRequest:
      type: object
      required: [log_did]
      properties:
        log_did: { type: string }

    MonMirrorConsistencyRequest:
      type: object
      required: [officers_log_did, cases_log_did]
      properties:
        officers_log_did: { type: string }
        cases_log_did: { type: string }

    MonSealingComplianceRequest:
      type: object
      required: [local_log_did]
      properties:
        local_log_did: { type: string }

    MonGrantComplianceRequest:
      type: object
      required: [local_log_did]
      properties:
        local_log_did: { type: string }

    MonDashboardRequest:
      type: object
      required: [per_court]
      properties:
        per_court:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/MonitorResult' }

    MonitorResult:
      type: object
      properties:
        ok: { type: boolean }
        kind: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    MonitorDashboard:
      type: object
      properties:
        per_court:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/MonitorResult' }
        summary:
          type: object
          properties:
            total: { type: integer }
            ok: { type: integer }
            failures: { type: integer }

    # ── Consortium ────────────────────────────────────────────────
    ConsortiumProposalRequest:
      type: object
      required: [destination, target_did]
      properties:
        destination: { type: string, description: Consortium federated DID hosting the scope log. }
        target_did: { type: string, description: Member court being added/removed. }
        court_name: { type: string }
        reason: { type: string }

    AmendmentProposal:
      type: object
      properties:
        entry: { type: object, additionalProperties: true }
        proposal_type: { type: string }
        requires_unanimity: { type: boolean }

    ApprovalStatus:
      type: object
      properties:
        approvals_collected: { type: integer }
        approvals_required: { type: integer }
        complete: { type: boolean }

    # ── Generic exchange ──────────────────────────────────────────
    EntryBuildRequest:
      type: object
      required: [header, payload_b64]
      properties:
        header: { $ref: '#/components/schemas/ControlHeader' }
        payload_b64: { type: string, format: byte }

    EntrySignRequest:
      type: object
      required: [entry_bytes_b64]
      properties:
        entry_bytes_b64: { type: string, format: byte }

    EntrySubmitRequest:
      type: object
      required: [signed_entry_b64]
      properties:
        signed_entry_b64: { type: string, format: byte }

    EntryFullRequest:
      type: object
      required: [header, payload_b64]
      properties:
        header: { $ref: '#/components/schemas/ControlHeader' }
        payload_b64: { type: string, format: byte }

    SignedEntry:
      type: object
      required: [signed_entry_b64]
      properties:
        signed_entry_b64: { type: string, format: byte }
        signature_b64: { type: string, format: byte }

    SubmittedEntry:
      type: object
      properties:
        position: { $ref: '#/components/schemas/LogPositionRef' }
        content_hash: { type: string }
        committed: { type: boolean }

    EntryStatus:
      type: object
      properties:
        content_hash: { type: string }
        position: { $ref: '#/components/schemas/LogPositionRef' }
        committed: { type: boolean }
        committed_at: { type: integer, format: int64 }

    # ── Keys ──────────────────────────────────────────────────────
    KeyGenerateRequest:
      type: object
      required: [did, purpose, curve]
      properties:
        did: { type: string }
        purpose: { type: string, enum: [signing, encryption, delegation] }
        curve: { type: string, enum: [ed25519, secp256k1] }

    KeyRotateRequest:
      type: object
      required: [did, tier]
      properties:
        did: { type: string }
        tier: { type: integer }

    KeyEscrowRequest:
      type: object
      required: [did, threshold, shares]
      properties:
        did: { type: string }
        threshold: { type: integer }
        shares: { type: integer }
        recipient_dids:
          type: array
          items: { type: string }

    KeyInfo:
      type: object
      properties:
        key_id: { type: string }
        did: { type: string }
        purpose: { type: string }
        curve: { type: string }
        public_key:
          type: string
          format: byte
        created: { type: string, format: date-time }
        rotated: { type: string, format: date-time }
        rotation_tier: { type: integer }

    EscrowEnvelope:
      type: object
      properties:
        threshold: { type: integer }
        shares: { type: integer }
        recipients:
          type: array
          items: { type: string }

    # ── DIDs ──────────────────────────────────────────────────────
    DIDCreateRequest:
      type: object
      required: [method]
      properties:
        method: { type: string, enum: [web, key, peer] }
        operator_endpoint: { type: string }

    DIDDocument:
      type: object
      properties:
        id: { type: string }
        controller: { type: string }
        verification_method:
          type: array
          items: { type: object, additionalProperties: true }

    # ── Scope ─────────────────────────────────────────────────────
    ScopeProposeRequest:
      type: object
      required: [destination, proposal_type]
      properties:
        destination: { type: string }
        proposal_type: { type: string }
        target_did: { type: string }
        description: { type: string }
        proposal_payload:
          type: string
          format: byte

    DelegationCreateRequest:
      type: object
      required: [destination, delegate_did, scope]
      properties:
        destination: { type: string }
        delegate_did: { type: string }
        scope: { type: array, items: { type: string } }
        not_before: { type: integer, format: int64 }
        not_after: { type: integer, format: int64 }
